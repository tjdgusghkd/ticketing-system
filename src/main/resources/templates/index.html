<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>티켓랩</title>

  <link rel="stylesheet" th:href="@{/css/common/reset.css}" />
  <link rel="stylesheet" th:href="@{/css/common/layout.css}" />
  <link rel="stylesheet" th:href="@{/css/common/header.css}" />
  <link rel="stylesheet" th:href="@{/css/common/footer.css}" />
  <link rel="stylesheet" th:href="@{/css/main/home.css}" />
</head>
<body>
  <div class="page">
    <div th:replace="~{common/header :: header}"></div>

    <main class="main home-main">
	  <section class="hero-section" style="padding: 60px 0; text-align: center; background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);">
	    <div class="section-title-wrap">
	      <h1 style="font-size: 2.5rem; margin-bottom: 15px; color: #fff;">NOW PLAYING</h1>
	      <p style="color: #b0b0b0; font-size: 1.1rem;">TICKETLAB에서만 만날 수 있는 가장 특별한 순간들</p>
	    </div>
	  </section>
	
	  <section class="concert-list-section">
	    <div class="list-header">
	      <h2>공연 목록</h2>
	      <span class="result-count" th:text="|총 ${concertList.size()}건|">총 0건</span>
	    </div>
	
	    <div class="concert-list">
	      <article class="concert-item" th:each="concert : ${concertList}">
	        <div class="concert-main">
	          <div class="concert-thumb">
	             <img th:src="@{${concert.posterUrl}}" th:alt="${concert.title}" 
	                  style="width:100%; height:100%; object-fit:cover; border-radius: 8px;">
	          </div>
	
	          <div class="concert-info">
	            <div class="concert-badge" th:text="${concert.status}">예매가능</div>
	            <h3 th:text="${concert.title}">공연 제목</h3>
	            <p class="concert-place" th:text="${concert.artist}">아티스트 명</p>
	            <p class="concert-genre" th:text="${concert.description}">공연 설명</p>
	            <p class="concert-date" th:if="${!concert.schedules.isEmpty()}"
	               th:text="|공연 시작: ${#temporals.format(concert.schedules[0].startTime, 'yyyy-MM-dd')}|">
	               공연일
	            </p>
	          </div>
	        </div>
		
	
	        <div class="concert-action">
	          <div class="price-info">전석 TICKETLAB 특가</div>
	          <a th:href="@{/concerts/{id}(id=${concert.concertNo})}" class="reserve-btn">확인하기</a>
	        </div>
	      </article>
	
	      <div th:if="${#lists.isEmpty(concertList)}" style="text-align: center; padding: 50px; color: #ccc;">
	        현재 예매 가능한 공연이 없습니다.
	      </div>
	    </div>
	  </section>
	</main>
    <div th:replace="~{common/footer :: footer}"></div>
  </div>

  <script th:src="@{/js/main.js}"></script>
</body>
</html>
