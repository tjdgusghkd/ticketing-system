<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NeonPulse Sign Up</title>

  <link rel="stylesheet" th:href="@{/css/common/reset.css}" />
  <link rel="stylesheet" th:href="@{/css/common/layout.css}" />
  <link rel="stylesheet" th:href="@{/css/common/footer.css}" />
  <link rel="stylesheet" th:href="@{/css/member/signup.css}" />

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />
</head>
<body>
  <div class="signup-page">
    <div class="bg-orb bg-orb-left"></div>
    <div class="bg-orb bg-orb-right"></div>

    <div class="signup-content">
      <div class="brand-wrap">
        <h1 class="brand-title">Neon<span>Pulse</span></h1>
        <p class="brand-subtitle">회원가입 후 원하는 공연을 예매해보세요</p>
      </div>

      <div class="content-wrap">
        <div class="signup-card">
          <h2>회원가입</h2>
          <p class="card-subtitle">계정을 생성하고 공연 예매를 시작해보세요.</p>

          <form class="signup-form" th:action="@{/members/signup}" method="post">
            <div class="form-group">
              <label for="loginId">아이디</label>
              <div class="input-wrap">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="loginId" name="loginId" placeholder="아이디를 입력하세요" />
              </div>
            </div>

            <div class="form-group">
              <label for="email">이메일</label>
              <div class="input-wrap">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="email" name="email" placeholder="이메일을 입력하세요" />
              </div>
            </div>

            <div class="form-group">
              <label for="phone">휴대폰 번호</label>
              <div class="input-wrap">
                <i class="fa-solid fa-phone"></i>
                <input type="text" id="phone" name="phone" placeholder="휴대폰 번호를 입력하세요" />
              </div>
            </div>

            <div class="form-group">
              <label for="password">비밀번호</label>
              <div class="input-wrap">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" />
              </div>
            </div>

            <div class="form-group">
              <label for="confirmPassword">비밀번호 확인</label>
              <div class="input-wrap">
                <i class="fa-solid fa-shield-halved"></i>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="비밀번호를 다시 입력하세요" />
              </div>
            </div>

            <button type="button" class="signup-btn">회원가입</button>
          </form>

          <div class="card-footer">
            <span>이미 계정이 있으신가요?</span>
            <a th:href="@{/members/signin}">로그인하러가기</a>
          </div>
        </div>

        <div class="side-text">SIGN UP</div>
      </div>

      <div class="bottom-text">SECURE SSL ENCRYPTED CONNECTION</div>
    </div>
  </div>

  <div th:replace="~{common/footer :: footer}"></div>
  <script th:src="@{/js/member/signup.js}"></script>
</body>
</html>
