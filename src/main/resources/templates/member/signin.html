<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NeonPulse Login</title>

  <link rel="stylesheet" th:href="@{/css/common/reset.css}" />
  <link rel="stylesheet" th:href="@{/css/common/layout.css}" />
  <link rel="stylesheet" th:href="@{/css/common/footer.css}" />
  <link rel="stylesheet" th:href="@{/css/member/signin.css}" />

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />
</head>
<body>
  <div class="login-page">
    <div class="bg-orb bg-orb-left"></div>
    <div class="bg-orb bg-orb-right"></div>

    <div class="login-content">
      <div class="brand-wrap">
        <h1 class="brand-title">Neon<span>Pulse</span></h1>
        <p class="brand-subtitle">로그인 후 공연 조회 및 예매를 진행하세요</p>
      </div>

      <div class="content-wrap">
        <div class="login-card">
          <h2>로그인</h2>
          <p class="card-subtitle">계정 정보를 입력하고 서비스를 이용해보세요.</p>

          <form class="login-form" th:action="@{/login}" method="post">
            <div class="form-group">
              <label for="loginId">아이디</label>
              <div class="input-wrap">
                <i class="fa-solid fa-user"></i>
                <input
                  type="text"
                  id="loginId"
                  name="loginId"
                  placeholder="아이디를 입력하세요"
                />
              </div>
            </div>

            <div class="form-group">
              <label for="password">비밀번호</label>
              <div class="input-wrap">
                <i class="fa-solid fa-lock"></i>
                <input
                  type="password"
                  id="password"
                  name="password"
                  placeholder="비밀번호를 입력하세요"
                />
              </div>
            </div>

            <div class="login-options">
              <label class="remember-wrap">
                <input type="checkbox" name="rememberMe" />
                <span>로그인 상태 유지</span>
              </label>

              <a href="#" class="find-link">비밀번호 찾기</a>
            </div>

            <button type="submit" class="login-btn">로그인</button>
          </form>

          <div class="card-footer">
            <span>아직 계정이 없으신가요?</span>
            <a th:href="@{/signup}">회원가입하러가기</a>
          </div>
        </div>

        <div class="side-text">LOGIN</div>
      </div>

      <div class="bottom-text">SECURE ACCESS FOR TICKETING SERVICE</div>
    </div>
  </div>

  <div th:replace="~{common/footer :: footer}"></div>
</body>
</html>
