<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>대기열 안내</title>

  <link rel="stylesheet" th:href="@{/css/common/reset.css}" />
  <link rel="stylesheet" th:href="@{/css/queue/queue.css}" />
</head>
<body>
  <div class="queue-page">
    <div class="bg-orb bg-orb-left"></div>
    <div class="bg-orb bg-orb-right"></div>

    <div class="queue-container">
      <div class="queue-logo-wrap">
        <p class="queue-brand">TicketLab</p>
        <h1 class="queue-title">현재 접속자가 많습니다</h1>
        <p class="queue-subtitle">
          보다 안정적인 예매 진행을 위해 순차적으로 입장 중입니다.
        </p>
      </div>

      <div class="queue-card">
        <div class="queue-status-badge">WAITING</div>

        <div class="queue-info-box">
          <p class="queue-label">내 대기 순번</p>
          <p class="queue-number">1,284</p>
        </div>

        <div class="queue-info-grid">
          <div class="queue-info-item">
            <p class="info-title">예상 대기 시간</p>
            <p class="info-value">약 4분</p>
          </div>

          <div class="queue-info-item">
            <p class="info-title">현재 상태</p>
            <p class="info-value status-text">입장 대기 중</p>
          </div>
        </div>

        <div class="progress-section">
          <div class="progress-header">
            <span>입장 진행률</span>
            <span id="progressText">32%</span>
          </div>

          <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
        </div>

        <div class="spinner-wrap">
          <div class="spinner"></div>
        </div>

        <div class="queue-message-box">
          <p class="queue-message">
            잠시만 기다려 주세요.  
            순서가 되면 자동으로 예매 페이지로 이동합니다.
          </p>
          <p class="queue-notice">
            ※ 새로고침 또는 페이지 이탈 시 대기 순번이 변경될 수 있습니다.
          </p>
        </div>
      </div>
    </div>
  </div>
<script th:src="@{/js/queue/queue.js}"></script>
</body>
</html>
