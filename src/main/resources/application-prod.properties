spring.datasource.url=jdbc:mysql://ticketing-db.cfmuwg404h87.ap-northeast-2.rds.amazonaws.com:3306/ticketing?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=admin
spring.datasource.password=${DB_PASSWORD}

spring.data.redis.host=redis
spring.data.redis.port=6379

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

server.tomcat.threads.max=300
server.tomcat.accept-count=200
server.tomcat.max-connections=8192
server.tomcat.connection-timeout=20000

spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=120000
spring.datasource.hikari.max-lifetime=150000
spring.datasource.hikari.connection-timeout=30000

spring.data.redis.lettuce.pool.max-active=10
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2

jwt.access-token-expiration=1800000
jwt.refresh-token-expiration=1209600000